name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

# Sets permissions for the GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and test
        id: lean
        uses: leanprover/lean-action@v1
        with:
          build: true
          test: false

      - name: Set up Python (for Alectryon)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Alectryon (Lean 4 fork)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install LeanInk (Lean 4 helper)
        run: |
          git clone https://github.com/leanprover/LeanInk.git
          cd LeanInk
          lake build
          mkdir -p "$HOME/.local/bin"
          if [ -f "build/bin/leanInk" ]; then
            cp build/bin/leanInk "$HOME/.local/bin/"
          elif [ -f ".lake/build/bin/leanInk" ]; then
            cp .lake/build/bin/leanInk "$HOME/.local/bin/"
          else
            echo "LeanInk executable not found after build" >&2
            ls -R .
            exit 1
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build interactive HTML (Alectryon)
        run: |
          ulimit -s 65536
          lake build Alectryon

  # Docs and Pages in a separate job so only one artifact named "github-pages" is produced.
  # lean-action installs elan/lake and restores build cache; docgen-action then builds docs and uploads once.
  pages:
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain and restore build
        uses: leanprover/lean-action@v1
        with:
          build: true
          test: false

      - name: Build docs and deploy to GitHub Pages
        uses: leanprover-community/docgen-action@v1
        with:
          api_docs: true
          lake_package_directory: .
          build_args: --log-level=warning
