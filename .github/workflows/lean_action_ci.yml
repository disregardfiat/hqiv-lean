name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

# Sets permissions for the GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and test
        id: lean
        uses: leanprover/lean-action@v1
        with:
          build: true
          test: false

  # Docs and Pages in a separate job so only one artifact named "github-pages" is produced
  # (avoids "Multiple artifacts named github-pages" when deploy-pages runs)
  pages:
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore Lake build cache
        uses: actions/cache/restore@v4
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}-${{ github.sha }}
          restore-keys: |
            lake-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}

      - name: Build docs and deploy to GitHub Pages
        uses: leanprover-community/docgen-action@v1
        with:
          api_docs: true
          lake_package_directory: .
          build_args: --log-level=warning
