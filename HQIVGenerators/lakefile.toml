name = "HQIVGenerators"
version = "0.1.0"
packagesDir = "../.lake/packages"

[[lean_lib]]
name = "HQIVGenerators"
# SO(8) Lie closure from octonion generators. Build with: ulimit -s 65536 && lake build
globs = ["Hqiv.Generators", "Hqiv.OctonionLeftMultiplication", "Hqiv.GeneratorsFromAxioms", "Hqiv.GeneratorsLieClosureData", "Hqiv.So8CoordMatrix", "Hqiv.GeneratorsLieClosure"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.28.0"
